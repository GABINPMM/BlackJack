<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Roulette of Maki</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 3rem;
            margin-top: 20px;
            color: #f1c40f;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Teams Section */
        #teams-container {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .team {
            background: #2c3e50;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 2px solid transparent;
        }

        .team:hover {
            transform: scale(1.05);
            border-color: #f1c40f;
        }

        .team.dead {
            text-decoration: line-through;
            opacity: 0.5;
            background: #e74c3c;
            pointer-events: none; /* Empêche de cliquer une fois mort */
        }

        .team-name {
            font-weight: bold;
            color: #3498db;
            outline: none;
            pointer-events: auto; /* Permet d'éditer même si le parent a une action */
        }

        /* Roulette Section */
        .roulette-wrapper {
            position: relative;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pointer-ball {
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #7f8c8d);
            border-radius: 50%;
            position: absolute;
            top: -10px;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .pointer-arrow {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid #bdc3c7;
            position: absolute;
            top: 8px;
            z-index: 9;
        }

        #wheel {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.25, 1, 0.25, 1); /* Animation de rotation réaliste */
        }

        .slice-text {
            position: absolute;
            top: 0;
            left: 50%;
            width: 40px;
            height: 175px; /* Moitié de la hauteur de la roue */
            margin-left: -20px;
            transform-origin: 50% 100%;
            display: flex;
            justify-content: center;
            padding-top: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            box-sizing: border-box;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        #spin-btn {
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #1e1e2f;
            background-color: #f1c40f;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(241, 196, 15, 0.5);
            transition: background 0.3s, transform 0.1s;
        }

        #spin-btn:hover {
            background-color: #f39c12;
        }

        #spin-btn:active {
            transform: scale(0.95);
        }

        #spin-btn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Modal Overlay */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #fff;
            color: #333;
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-content h2 {
            margin-top: 0;
            color: #e74c3c;
            font-size: 1.8rem;
        }

        .modal-content p {
            font-size: 1.4rem;
            line-height: 1.5;
            margin: 20px 0;
        }

        .modal-content button {
            padding: 10px 30px;
            font-size: 1.2rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .modal-content button:hover {
            background: #2980b9;
        }

        /* Instruction */
        .instruction {
            margin-top: 30px;
            color: #bdc3c7;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>The Roulette of Maki</h1>

    <div id="teams-container"></div>

    <div class="roulette-wrapper">
        <div class="pointer-ball"></div>
        <div class="pointer-arrow"></div>
        <div id="wheel"></div>
    </div>

    <button id="spin-btn" onclick="spinWheel()">Spin the Wheel!</button>

    <div class="instruction">
        Tip: Click on a team's name to change it. Click anywhere else on the team's box to remove a life.
    </div>

    <!-- Modal pour afficher la question -->
    <div id="modal">
        <div class="modal-content">
            <h2>Question Time!</h2>
            <p id="question-text">Here is the question...</p>
            <button onclick="closeModal()">Spin Again</button>
        </div>
    </div>

    <script>
        // Traduction et intégration de tes questions + 1 bonus pour avoir 15 piles.
        const questions = [
            "Do you think the media controls our minds?",
            "What word is used to describe when a medium intentionally ignores a specific subject, often for political or financial reasons?",
            "On social media, what do we call automated accounts run by code that publish mass messages?",
            "Who are France's three opponents in the World Cup?",
            "Name the player who was picked first overall in the 2023 NBA draft.",
            "In football, if a goalkeeper handles the ball inside their own penalty area after a deliberate pass from a teammate, what does the referee whistle?",
            "What is the most influential association at INSA?",
            "What is the main headline or lead story of a newspaper called?",
            "How do you say 'match nul' in English?",
            "How do you say 'les vestiaires' in English?",
            "What do the five rings of the Olympic Games represent?",
            "What is the origin of the marathon, and what historical event led to the creation of this race?",
            "Which racket sport is played on different surfaces?",
            "What sport was invented by a major association at INSA?",
            "In a football match, if i score a goal and i dance the shatta in front of the opposite team fans to make fun ok them,what sanction could apply to me" //La 15ème question ajoutée
        ];

        // Trois couleurs de la roulette
        const colors = ['#e74c3c', '#34495e', '#27ae60']; // Rouge, Noir/Gris Foncé, Vert

        // Équipes et Vies
        let teams = [
            { name: "Team 1", lives: 3 },
            { name: "Team 2", lives: 3 },
            { name: "Team 3", lives: 3 }
        ];

        let currentRotation = 0;
        let isSpinning = false;
        const slices = 15;
        const sliceAngle = 360 / slices;

        // Initialisation de la page
        function init() {
            renderTeams();
            buildWheel();
        }

        // Affichage des équipes
        function renderTeams() {
            const container = document.getElementById('teams-container');
            container.innerHTML = '';

            teams.forEach((team, index) => {
                const teamDiv = document.createElement('div');
                teamDiv.className = `team ${team.lives <= 0 ? 'dead' : ''}`;
                // Si on clique sur la div, on perd une vie
                teamDiv.onclick = () => loseLife(index);

                // Le conteneur du texte
                const content = document.createElement('span');
                content.innerHTML = `
                    <span class="team-name" contenteditable="true" onclick="event.stopPropagation()" onblur="updateName(${index}, this.innerText)">${team.name}</span>
                    <br>
                    <span style="font-size:1.5rem; display:block; margin-top:5px;">${'❤️'.repeat(team.lives)}</span>
                `;
                teamDiv.appendChild(content);
                container.appendChild(teamDiv);
            });
        }

        // Mettre à jour le nom (évite les bugs quand on tape)
        function updateName(index, newName) {
            teams[index].name = newName;
        }

        // Perdre une vie
        function loseLife(index) {
            if (teams[index].lives > 0) {
                teams[index].lives--;
                renderTeams();
            }
        }

        // Construction visuelle de la roulette avec CSS Conic Gradient
        function buildWheel() {
            const wheel = document.getElementById('wheel');
            let gradientSegments = [];

            for (let i = 0; i < slices; i++) {
                let startAngle = i * sliceAngle;
                let endAngle = (i + 1) * sliceAngle;
                let color = colors[i % 3]; // Alterne entre les 3 couleurs
                
                gradientSegments.push(`${color} ${startAngle}deg ${endAngle}deg`);

                // Ajouter le numéro sur la roue
                let textDiv = document.createElement('div');
                textDiv.className = 'slice-text';
                // On positionne le texte au milieu de la tranche
                textDiv.style.transform = `rotate(${startAngle + (sliceAngle / 2)}deg)`;
                textDiv.innerHTML = i + 1;
                wheel.appendChild(textDiv);
            }

            wheel.style.background = `conic-gradient(${gradientSegments.join(', ')})`;
        }

        // Fonction pour faire tourner la roulette
        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;

            // Ajoute entre 5 et 10 tours complets, plus un angle aléatoire
            const spins = (Math.floor(Math.random() * 5) + 5) * 360; 
            const randomAngle = Math.floor(Math.random() * 360);
            currentRotation += spins + randomAngle;

            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // Calculer sur quelle tranche on tombe
            // La flèche est en haut (0° dans l'espace global).
            // Si la roue tourne de X degrés en sens horaire, le point qui se retrouve en haut
            // correspond à l'angle (360 - (X % 360)) sur la roue.
            setTimeout(() => {
                const offsetAngle = (360 - (currentRotation % 360)) % 360;
                const winningSliceIndex = Math.floor(offsetAngle / sliceAngle);
                
                showQuestion(winningSliceIndex);
            }, 4000); // 4000ms correspond à la durée de la transition CSS
        }

        // Afficher la question dans le popup
        function showQuestion(index) {
            const modal = document.getElementById('modal');
            const questionText = document.getElementById('question-text');
            
            questionText.innerHTML = `<strong>Question ${index + 1}:</strong><br><br>${questions[index]}`;
            modal.style.display = 'flex';
        }

        // Fermer la popup
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            isSpinning = false;
            document.getElementById('spin-btn').disabled = false;
        }

        // Lancement initial
        init();
    </script>
</body>
</html>
